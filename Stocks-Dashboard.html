<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock & Crypto Dashboard — TechWithKeshav</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:rgba(255,255,255,0.07);
      --text:#f0f0ff;--muted:#8888aa;--light:#ccccdd;
      --green:#10b981;--green-light:rgba(16,185,129,0.12);
      --red:#ef4444;--red-light:rgba(239,68,68,0.12);
      --primary:#7c3aed;--primary-light:rgba(124,58,237,0.12);
      --blue:#3b82f6;--amber:#f59e0b;
      --grad1:linear-gradient(135deg,#7c3aed,#2563eb);
      --grad2:linear-gradient(135deg,#10b981,#2563eb);
      --space-xs:4px;--space-sm:8px;--space-md:16px;--space-lg:24px;--space-xl:32px;
      --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-full:100px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}

    /* BACKGROUND */
    .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(124,58,237,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
    .nav-brand{font-family:'Inter',sans-serif;font-size:1rem;font-weight:900;background:var(--grad1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nav-time{font-size:0.72rem;color:var(--muted);letter-spacing:1px}
    .nav-status{display:flex;align-items:center;gap:6px;font-size:0.72rem;color:var(--green)}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

    /* LAYOUT */
    .wrapper{max-width:1100px;margin:0 auto;padding:var(--space-lg);position:relative;z-index:1}
    .page-title{font-family:'Inter',sans-serif;font-size:1.8rem;font-weight:900;letter-spacing:-1px;margin-bottom:var(--space-xs)}
    .page-sub{color:var(--muted);font-size:0.82rem;margin-bottom:var(--space-xl)}
    .page-title span{background:var(--grad1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    /* CARDS */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-xl)}
    .card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-md)}
    .section-title{font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:var(--space-md);display:flex;align-items:center;gap:8px}
    .section-title::before{content:'';width:20px;height:2px;background:var(--grad1);border-radius:2px}

    /* SEARCH */
    .search-section{margin-bottom:var(--space-lg)}
    .search-tabs{display:flex;gap:var(--space-sm);margin-bottom:var(--space-md)}
    .search-tab{padding:8px 20px;border-radius:var(--radius-full);font-family:'Space Grotesk',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all 0.2s;letter-spacing:0.5px}
    .search-tab.active{background:var(--grad1);border-color:transparent;color:#fff}
    .search-row{display:flex;gap:var(--space-sm)}
    .search-input{flex:1;padding:12px var(--space-md);background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Space Grotesk',sans-serif;font-size:0.88rem;color:var(--text);outline:none;transition:all 0.2s}
    .search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(124,58,237,0.15)}
    .search-input::placeholder{color:var(--muted)}
    .btn-search{padding:12px var(--space-xl);background:var(--grad1);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Space Grotesk',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap}
    .btn-search:hover{opacity:0.85;transform:translateY(-1px)}
    .btn-search:disabled{opacity:0.5;cursor:not-allowed;transform:none}

    /* RESULT CARD */
    .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-xl);margin-bottom:var(--space-lg);display:none;animation:fadeIn 0.4s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .result-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:var(--space-lg);flex-wrap:wrap;gap:var(--space-md)}
    .result-left{display:flex;align-items:center;gap:var(--space-md)}
    .result-icon{width:52px;height:52px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:var(--primary-light);border:1px solid rgba(124,58,237,0.2)}
    .result-name{font-family:'Inter',sans-serif;font-size:1.2rem;font-weight:900;letter-spacing:-0.5px}
    .result-symbol{font-size:0.75rem;color:var(--muted);margin-top:2px;letter-spacing:1px;text-transform:uppercase}
    .result-price{font-family:'Inter',sans-serif;font-size:2.2rem;font-weight:900;letter-spacing:-1px}
    .result-change{font-size:0.85rem;font-weight:700;padding:4px 12px;border-radius:var(--radius-full);margin-top:4px;display:inline-block}
    .change-up{background:var(--green-light);color:var(--green)}
    .change-down{background:var(--red-light);color:var(--red)}
    .result-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:var(--space-sm);margin-bottom:var(--space-lg)}
    .stat-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:var(--space-md)}
    .stat-label{font-size:0.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
    .stat-value{font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:700;color:var(--text)}
    .btn-watchlist{width:100%;padding:12px;background:var(--primary-light);color:#c084fc;border:1px solid rgba(124,58,237,0.3);border-radius:var(--radius-sm);font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:var(--space-sm)}
    .btn-watchlist:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
    .btn-watchlist.added{background:var(--green-light);color:var(--green);border-color:rgba(16,185,129,0.3)}

    /* CHART */
    .chart-wrap{position:relative;height:200px;margin-bottom:var(--space-md)}

    /* MARKET OVERVIEW */
    .market-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:var(--space-sm);margin-bottom:var(--space-lg)}
    .market-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-md);transition:all 0.2s;cursor:pointer}
    .market-card:hover{border-color:rgba(124,58,237,0.4);transform:translateY(-2px)}
    .market-card-symbol{font-size:0.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
    .market-card-name{font-size:0.78rem;color:var(--light);margin-bottom:var(--space-sm)}
    .market-card-price{font-family:'Inter',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:4px}
    .market-card-change{font-size:0.72rem;font-weight:700;padding:2px 8px;border-radius:var(--radius-full);display:inline-block}

    /* WATCHLIST */
    .watchlist-grid{display:flex;flex-direction:column;gap:var(--space-sm)}
    .watchlist-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-md) var(--space-lg);display:flex;align-items:center;justify-content:space-between;transition:all 0.2s;animation:fadeIn 0.3s ease}
    .watchlist-item:hover{border-color:rgba(124,58,237,0.3)}
    .watchlist-left{display:flex;align-items:center;gap:var(--space-md)}
    .watchlist-icon{width:36px;height:36px;border-radius:var(--radius-sm);background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .watchlist-symbol{font-size:0.88rem;font-weight:700;color:var(--text)}
    .watchlist-name{font-size:0.72rem;color:var(--muted);margin-top:1px}
    .watchlist-right{display:flex;align-items:center;gap:var(--space-md)}
    .watchlist-price{font-family:'Inter',sans-serif;font-size:1rem;font-weight:800;color:var(--text)}
    .watchlist-change{font-size:0.72rem;font-weight:700;padding:3px 10px;border-radius:var(--radius-full)}
    .remove-btn{width:26px;height:26px;border-radius:50%;background:var(--red-light);border:none;color:var(--red);font-size:0.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
    .remove-btn:hover{background:var(--red);color:#fff}
    .empty-watch{text-align:center;color:var(--muted);font-size:0.82rem;padding:var(--space-xl) 0}

    /* LOADING */
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* GRID LAYOUT */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-lg)}
    @media(max-width:768px){.two-col{grid-template-columns:1fr}.search-row{flex-direction:column}.result-header{flex-direction:column}.result-price{font-size:1.6rem}}

    /* POPULAR TAGS */
    .popular-row{display:flex;flex-wrap:wrap;gap:var(--space-xs);margin-top:var(--space-sm)}
    .popular-tag{padding:4px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-full);font-size:0.7rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.2s}
    .popular-tag:hover{border-color:rgba(124,58,237,0.4);color:#c084fc}

    /* TYPE BADGE */
    .type-badge{font-size:0.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:var(--radius-full);margin-left:6px}
    .type-crypto{background:rgba(245,158,11,0.12);color:var(--amber);border:1px solid rgba(245,158,11,0.25)}
    .type-stock{background:rgba(59,130,246,0.12);color:var(--blue);border:1px solid rgba(59,130,246,0.25)}
  </style>
</head>
<body>

<div class="bg-grid"></div>

<nav>
  <div class="nav-brand">📈 MarketPulse</div>
  <div class="nav-status"><span class="status-dot"></span> Markets Live</div>
  <div class="nav-time" id="nav-time"></div>
</nav>

<div class="wrapper">

  <div class="page-title">Stock & <span>Crypto</span> Dashboard</div>
  <p class="page-sub">Search any stock or cryptocurrency. Track prices, view charts, and build your watchlist.</p>

  <!-- SEARCH -->
  <div class="search-section card">
    <div class="search-tabs">
      <button class="search-tab active" id="tab-crypto" onclick="setTab('crypto')">🪙 Crypto</button>
      <button class="search-tab" id="tab-stock" onclick="setTab('stock')">📈 Stocks</button>
    </div>
    <div class="search-row">
      <input class="search-input" id="search-input" placeholder="e.g. bitcoin, ethereum, BTC..." onkeydown="if(event.key==='Enter') search()"/>
      <button class="btn-search" id="search-btn" onclick="search()">Search</button>
    </div>
    <div class="popular-row" id="popular-tags"></div>
  </div>

  <!-- RESULT -->
  <div class="result-card" id="result-card">
    <div class="result-header">
      <div class="result-left">
        <div class="result-icon" id="result-icon">₿</div>
        <div>
          <div class="result-name" id="result-name">Bitcoin</div>
          <div class="result-symbol" id="result-symbol">BTC <span class="type-badge type-crypto">Crypto</span></div>
        </div>
      </div>
      <div style="text-align:right">
        <div class="result-price" id="result-price">$0.00</div>
        <div class="result-change" id="result-change">+0.00%</div>
      </div>
    </div>
    <div class="result-stats" id="result-stats"></div>
    <div class="chart-wrap">
      <canvas id="price-chart"></canvas>
    </div>
    <button class="btn-watchlist" id="add-watchlist-btn" onclick="addToWatchlist()">+ Add to Watchlist</button>
  </div>

  <!-- MARKET OVERVIEW -->
  <div style="margin-bottom:var(--space-lg)">
    <div class="section-title">Market Overview</div>
    <div class="market-grid" id="market-grid">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- TWO COLUMN -->
  <div class="two-col">

    <!-- WATCHLIST -->
    <div class="card">
      <div class="section-title">My Watchlist</div>
      <div class="watchlist-grid" id="watchlist-container">
        <p class="empty-watch" id="watchlist-empty">No items yet. Search and add assets above! 👆</p>
      </div>
    </div>

    <!-- TOP CRYPTO -->
    <div class="card">
      <div class="section-title">Top Cryptocurrencies</div>
      <div id="top-crypto-container">
        <div style="color:var(--muted);font-size:0.82rem;text-align:center;padding:var(--space-xl) 0">Loading...</div>
      </div>
    </div>

  </div>
</div>

<script>
  // ─── CONFIG ──────────────────────────────────────────────
  const AV_KEY = 'TMHT6OMHNU714KDO'

  // ─── STATE ───────────────────────────────────────────────
  let activeTab     = 'crypto'
  let currentResult = null
  let watchlist     = JSON.parse(localStorage.getItem('marketpulse_watch') || '[]')
  let priceChart    = null

  // ─── POPULAR TAGS ────────────────────────────────────────
  const POPULAR = {
    crypto: ['bitcoin','ethereum','solana','cardano','dogecoin','ripple'],
    stock:  ['AAPL','TSLA','GOOGL','RELIANCE.BSE','TCS.BSE','INFY.BSE']
  }

  const CRYPTO_ICONS = {
    bitcoin:'₿', ethereum:'Ξ', solana:'◎', cardano:'₳',
    dogecoin:'Ð', ripple:'✕', binancecoin:'🔶', polkadot:'●'
  }

  // ─── MARKET OVERVIEW DATA ────────────────────────────────
  const MARKET_OVERVIEW = [
    { symbol:'BTC',  name:'Bitcoin',   id:'bitcoin',  icon:'₿',  type:'crypto' },
    { symbol:'ETH',  name:'Ethereum',  id:'ethereum', icon:'Ξ',  type:'crypto' },
    { symbol:'SOL',  name:'Solana',    id:'solana',   icon:'◎',  type:'crypto' },
    { symbol:'AAPL', name:'Apple',     id:'AAPL',     icon:'🍎', type:'stock'  },
    { symbol:'TSLA', name:'Tesla',     id:'TSLA',     icon:'⚡', type:'stock'  },
    { symbol:'NVDA', name:'NVIDIA',    id:'NVDA',     icon:'🟢', type:'stock'  },
  ]

  // ─── INIT ────────────────────────────────────────────────
  function init() {
    updateClock()
    setInterval(updateClock, 1000)
    renderPopularTags()
    renderWatchlist()
    loadMarketOverview()
    loadTopCrypto()
  }

  // ─── CLOCK ───────────────────────────────────────────────
  function updateClock() {
    const now = new Date()
    document.getElementById('nav-time').textContent =
      now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit' })
  }

  // ─── TABS ────────────────────────────────────────────────
  function setTab(tab) {
    activeTab = tab
    document.getElementById('tab-crypto').classList.toggle('active', tab === 'crypto')
    document.getElementById('tab-stock').classList.toggle('active', tab === 'stock')
    document.getElementById('search-input').placeholder =
      tab === 'crypto' ? 'e.g. bitcoin, ethereum, BTC...' : 'e.g. AAPL, TSLA, RELIANCE.BSE, TCS.BSE...'
    renderPopularTags()
    document.getElementById('result-card').style.display = 'none'
  }

  function renderPopularTags() {
    const tags = POPULAR[activeTab]
    document.getElementById('popular-tags').innerHTML =
      '<span style="font-size:0.7rem;color:var(--muted);margin-right:4px">Popular:</span>' +
      tags.map(t => `<span class="popular-tag" onclick="quickSearch('${t}')">${t.toUpperCase()}</span>`).join('')
  }

  function quickSearch(term) {
    document.getElementById('search-input').value = term
    search()
  }

  // ─── SEARCH ──────────────────────────────────────────────
  async function search() {
    const query = document.getElementById('search-input').value.trim()
    if (!query) return

    const btn = document.getElementById('search-btn')
    btn.innerHTML = '<span class="spinner"></span> Searching...'
    btn.disabled  = true

    try {
      if (activeTab === 'crypto') {
        await searchCrypto(query)
      } else {
        await searchStock(query)
      }
    } catch(e) {
      showToast('Search failed. Try again.', 'red')
    } finally {
      btn.innerHTML = 'Search'
      btn.disabled  = false
    }
  }

  // ─── CRYPTO SEARCH (CoinGecko) ───────────────────────────
  async function searchCrypto(query) {
    // First search for the coin ID
    const searchRes  = await fetch(`https://api.coingecko.com/api/v3/search?query=${query}`)
    const searchData = await searchRes.json()

    if (!searchData.coins || searchData.coins.length === 0) {
      showToast('Coin not found. Try full name e.g. "bitcoin"', 'amber')
      return
    }

    const coin = searchData.coins[0]

    // Then get full data
    const dataRes  = await fetch(`https://api.coingecko.com/api/v3/coins/${coin.id}?localization=false&tickers=false&community_data=false&developer_data=false`)
    const data     = await dataRes.json()

    const price     = data.market_data.current_price.usd
    const change24h = data.market_data.price_change_percentage_24h
    const high24h   = data.market_data.high_24h.usd
    const low24h    = data.market_data.low_24h.usd
    const mktCap    = data.market_data.market_cap.usd
    const volume    = data.market_data.total_volume.usd
    const rank      = data.market_cap_rank

    currentResult = {
      id: coin.id, symbol: coin.symbol.toUpperCase(),
      name: data.name, price, change24h,
      type: 'crypto',
      icon: CRYPTO_ICONS[coin.id] || coin.symbol.charAt(0).toUpperCase()
    }

    // Get 7-day chart data
    const chartRes  = await fetch(`https://api.coingecko.com/api/v3/coins/${coin.id}/market_chart?vs_currency=usd&days=7`)
    const chartData = await chartRes.json()
    const prices    = chartData.prices.map(p => p[1])
    const labels    = chartData.prices.map(p => {
      const d = new Date(p[0])
      return `${d.getMonth()+1}/${d.getDate()}`
    })

    displayResult({
      icon: currentResult.icon,
      name: data.name,
      symbol: `${coin.symbol.toUpperCase()} · Rank #${rank}`,
      type: 'crypto',
      price: `$${formatNum(price)}`,
      change: change24h,
      stats: [
        { label:'24h High', value:`$${formatNum(high24h)}` },
        { label:'24h Low',  value:`$${formatNum(low24h)}` },
        { label:'Market Cap', value:formatLarge(mktCap) },
        { label:'24h Volume', value:formatLarge(volume) },
      ],
      chartLabels: labels,
      chartPrices: prices,
      chartColor: change24h >= 0 ? '#10b981' : '#ef4444'
    })
  }

  // ─── STOCK SEARCH (Alpha Vantage — reliable, no proxy needed) ──
  async function searchStock(query) {
    const symbol = query.toUpperCase()

    try {
      // Alpha Vantage — direct API, no proxy, no CORS issues
      const url  = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${AV_KEY}`
      const res  = await fetch(url)
      const data = await res.json()

      // Check for rate limit message
      if (data.Note || data.Information) {
        // API limit hit — use mock/cached data for demo
        showToast('API limit reached — showing demo data', 'amber')
        showMockStock(symbol)
        return
      }

      const quote = data['Global Quote']
      if (!quote || !quote['05. price']) {
        showToast('Stock not found. Try: AAPL, TSLA, GOOGL, MSFT', 'amber')
        return
      }

      const price     = parseFloat(quote['05. price'])
      const change    = parseFloat(quote['09. change'])
      const changePct = parseFloat(quote['10. change percent'].replace('%',''))
      const open      = parseFloat(quote['02. open'])
      const high      = parseFloat(quote['03. high'])
      const low       = parseFloat(quote['04. low'])
      const volume    = parseInt(quote['06. volume'])
      const prevClose = parseFloat(quote['08. previous close'])

      currentResult = {
        id: symbol, symbol, name: symbol,
        price, change: changePct,
        type: 'stock', icon: symbol.charAt(0)
      }

      // Generate realistic chart from price (since daily chart also uses quota)
      const chartData = generateMockChart(price, 30)

      displayResult({
        icon: symbol.charAt(0),
        name: symbol,
        symbol: `${symbol} · NYSE/NASDAQ`,
        type: 'stock',
        price: `$${formatNum(price)}`,
        change: changePct,
        stats: [
          { label:'Open',       value:`$${formatNum(open)}` },
          { label:'High',       value:`$${formatNum(high)}` },
          { label:'Low',        value:`$${formatNum(low)}` },
          { label:'Prev Close', value:`$${formatNum(prevClose)}` },
          { label:'Volume',     value:formatLarge(volume) },
          { label:'Change',     value:`${change >= 0 ? '+' : ''}$${change.toFixed(2)}` },
        ],
        chartLabels: chartData.labels,
        chartPrices: chartData.prices,
        chartColor: changePct >= 0 ? '#10b981' : '#ef4444'
      })
    } catch(e) {
      showToast('Failed to fetch. Check your connection.', 'red')
      console.error(e)
    }
  }

  // ─── MOCK STOCK (shown when API limit hit) ───────────────
  function showMockStock(symbol) {
    const mockData = {
      AAPL:  { price:189.30, change:1.24,  name:'Apple Inc.' },
      TSLA:  { price:177.50, change:-2.31, name:'Tesla Inc.' },
      GOOGL: { price:175.80, change:0.87,  name:'Alphabet Inc.' },
      MSFT:  { price:415.20, change:1.52,  name:'Microsoft Corp.' },
      AMZN:  { price:185.60, change:0.63,  name:'Amazon.com Inc.' },
      NVDA:  { price:875.40, change:3.21,  name:'NVIDIA Corp.' },
      'RELIANCE.BSE': { price:2850.00, change:1.45, name:'Reliance Industries' },
      'TCS.BSE':      { price:3920.00, change:0.87, name:'Tata Consultancy Services' },
      'INFY.BSE':     { price:1456.00, change:-0.52, name:'Infosys Ltd.' },
      'HDFCBANK.BSE': { price:1623.00, change:0.93, name:'HDFC Bank Ltd.' },
      'WIPRO.BSE':    { price:452.00,  change:1.12, name:'Wipro Ltd.' },
    }
    const mock = mockData[symbol] || { price:100.00, change:0.50, name:symbol }
    const chart = generateMockChart(mock.price, 30)

    currentResult = {
      id: symbol, symbol, name: mock.name,
      price: mock.price, change: mock.change,
      type: 'stock', icon: symbol.charAt(0)
    }

    displayResult({
      icon: symbol.charAt(0),
      name: mock.name,
      symbol: `${symbol} · NYSE/NASDAQ · Demo Data`,
      type: 'stock',
      price: `$${formatNum(mock.price)}`,
      change: mock.change,
      stats: [
        { label:'Note', value:'Demo data — API limit reached' },
        { label:'Reset', value:'25 req/day · Resets midnight UTC' },
      ],
      chartLabels: chart.labels,
      chartPrices: chart.prices,
      chartColor: mock.change >= 0 ? '#10b981' : '#ef4444'
    })
  }

  // ─── GENERATE REALISTIC CHART DATA ───────────────────────
  function generateMockChart(currentPrice, days) {
    const prices = []
    const labels = []
    let price = currentPrice * 0.92
    for (let i = days; i >= 0; i--) {
      price = price * (1 + (Math.random() - 0.48) * 0.02)
      prices.push(parseFloat(price.toFixed(2)))
      const d = new Date()
      d.setDate(d.getDate() - i)
      labels.push(`${d.getMonth()+1}/${d.getDate()}`)
    }
    prices[prices.length - 1] = currentPrice
    return { prices, labels }
  }

  // ─── DISPLAY RESULT ──────────────────────────────────────
  function displayResult({ icon, name, symbol, type, price, change, stats, chartLabels, chartPrices, chartColor }) {
    document.getElementById('result-icon').textContent   = icon
    document.getElementById('result-name').textContent   = name
    document.getElementById('result-price').textContent  = price

    const typeBadge = `<span class="type-badge type-${type}">${type}</span>`
    document.getElementById('result-symbol').innerHTML   = symbol + ' ' + typeBadge

    const isUp = change >= 0
    const changeEl = document.getElementById('result-change')
    changeEl.textContent  = `${isUp ? '▲' : '▼'} ${Math.abs(change).toFixed(2)}%`
    changeEl.className    = `result-change ${isUp ? 'change-up' : 'change-down'}`

    document.getElementById('result-stats').innerHTML = stats.map(s => `
      <div class="stat-item">
        <div class="stat-label">${s.label}</div>
        <div class="stat-value">${s.value}</div>
      </div>
    `).join('')

    // Check if already in watchlist
    const inWatch = watchlist.some(w => w.id === currentResult.id)
    const wBtn    = document.getElementById('add-watchlist-btn')
    wBtn.textContent = inWatch ? '✓ In Watchlist' : '+ Add to Watchlist'
    wBtn.className   = `btn-watchlist ${inWatch ? 'added' : ''}`

    // Draw chart
    drawChart(chartLabels, chartPrices, chartColor, name)

    document.getElementById('result-card').style.display = 'block'
    document.getElementById('result-card').scrollIntoView({ behavior:'smooth', block:'start' })
  }

  // ─── CHART ───────────────────────────────────────────────
  function drawChart(labels, prices, color, label) {
    const ctx = document.getElementById('price-chart').getContext('2d')
    if (priceChart) priceChart.destroy()

    priceChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label,
          data: prices,
          borderColor: color,
          backgroundColor: color + '18',
          borderWidth: 2,
          fill: true,
          tension: 0.4,
          pointRadius: 0,
          pointHoverRadius: 4,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color:'rgba(255,255,255,0.04)' }, ticks: { color:'#8888aa', font:{ size:10 }, maxTicksLimit:7 } },
          y: { grid: { color:'rgba(255,255,255,0.04)' }, ticks: { color:'#8888aa', font:{ size:10 } } }
        },
        interaction: { intersect: false, mode:'index' }
      }
    })
  }

  // ─── WATCHLIST ───────────────────────────────────────────
  function addToWatchlist() {
    if (!currentResult) return
    const exists = watchlist.some(w => w.id === currentResult.id)
    if (exists) {
      showToast('Already in watchlist!', 'amber')
      return
    }
    watchlist.unshift(currentResult)
    localStorage.setItem('marketpulse_watch', JSON.stringify(watchlist))
    renderWatchlist()
    const btn = document.getElementById('add-watchlist-btn')
    btn.textContent = '✓ In Watchlist'
    btn.className   = 'btn-watchlist added'
    showToast(`${currentResult.name} added to watchlist! ⭐`, 'green')
  }

  function removeFromWatchlist(id) {
    watchlist = watchlist.filter(w => w.id !== id)
    localStorage.setItem('marketpulse_watch', JSON.stringify(watchlist))
    renderWatchlist()
    showToast('Removed from watchlist', 'red')
  }

  function renderWatchlist() {
    const container = document.getElementById('watchlist-container')
    document.getElementById('watchlist-empty').style.display = watchlist.length === 0 ? 'block' : 'none'
    document.querySelectorAll('.watchlist-item').forEach(el => el.remove())

    watchlist.forEach(item => {
      const isUp = item.change >= 0
      const el   = document.createElement('div')
      el.className = 'watchlist-item'
      el.innerHTML = `
        <div class="watchlist-left">
          <div class="watchlist-icon">${item.icon}</div>
          <div>
            <div class="watchlist-symbol">${item.symbol}</div>
            <div class="watchlist-name">${item.name}</div>
          </div>
        </div>
        <div class="watchlist-right">
          <div class="watchlist-price">$${formatNum(item.price)}</div>
          <div class="watchlist-change ${isUp ? 'change-up' : 'change-down'}">
            ${isUp ? '▲' : '▼'} ${Math.abs(item.change).toFixed(2)}%
          </div>
          <button class="remove-btn" onclick="removeFromWatchlist('${item.id}')">✕</button>
        </div>
      `
      container.appendChild(el)
    })
  }

  // ─── MARKET OVERVIEW ────────────────────────────────────
  async function loadMarketOverview() {
    const grid = document.getElementById('market-grid')
    grid.innerHTML = MARKET_OVERVIEW.map(m => `
      <div class="market-card skeleton" style="height:100px" id="mc-${m.symbol}"></div>
    `).join('')

    // Load crypto prices from CoinGecko
    try {
      const ids  = MARKET_OVERVIEW.filter(m => m.type === 'crypto').map(m => m.id).join(',')
      const res  = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`)
      const data = await res.json()

      MARKET_OVERVIEW.forEach(m => {
        const el = document.getElementById(`mc-${m.symbol}`)
        if (!el) return
        el.classList.remove('skeleton')

        let price, change
        if (m.type === 'crypto' && data[m.id]) {
          price  = data[m.id].usd
          change = data[m.id].usd_24h_change
        } else {
          price  = null
          change = null
        }

        const isUp = change >= 0
        el.innerHTML = `
          <div class="market-card-symbol">${m.icon} ${m.symbol}</div>
          <div class="market-card-name">${m.name}</div>
          ${price
            ? `<div class="market-card-price">$${formatNum(price)}</div>
               <div class="market-card-change ${isUp ? 'change-up' : 'change-down'}">
                 ${isUp ? '▲' : '▼'} ${Math.abs(change).toFixed(2)}%
               </div>`
            : `<div class="market-card-price" style="color:var(--muted);font-size:0.78rem">Search to load</div>`
          }
        `
        el.onclick = () => {
          setTab(m.type)
          quickSearch(m.type === 'crypto' ? m.id : m.symbol)
        }
      })
    } catch(e) {
      console.log('Market overview load failed:', e)
    }
  }

  // ─── TOP CRYPTO ──────────────────────────────────────────
  async function loadTopCrypto() {
    try {
      const res  = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=8&page=1&sparkline=false')
      const data = await res.json()
      const container = document.getElementById('top-crypto-container')
      container.innerHTML = data.map(coin => {
        const isUp = coin.price_change_percentage_24h >= 0
        return `
          <div class="watchlist-item" style="cursor:pointer" onclick="quickSearchCrypto('${coin.id}')">
            <div class="watchlist-left">
              <div class="watchlist-icon" style="background:rgba(245,158,11,0.1);font-size:0.7rem;font-weight:700;color:var(--muted)">#${coin.market_cap_rank}</div>
              <div>
                <div class="watchlist-symbol">${coin.symbol.toUpperCase()}</div>
                <div class="watchlist-name">${coin.name}</div>
              </div>
            </div>
            <div class="watchlist-right">
              <div class="watchlist-price">$${formatNum(coin.current_price)}</div>
              <div class="watchlist-change ${isUp ? 'change-up' : 'change-down'}">
                ${isUp ? '▲' : '▼'} ${Math.abs(coin.price_change_percentage_24h).toFixed(2)}%
              </div>
            </div>
          </div>
        `
      }).join('')
    } catch(e) {
      document.getElementById('top-crypto-container').innerHTML =
        '<div style="color:var(--muted);font-size:0.82rem;text-align:center;padding:var(--space-xl) 0">Failed to load. Check connection.</div>'
    }
  }

  function quickSearchCrypto(id) {
    setTab('crypto')
    document.getElementById('search-input').value = id
    search()
  }

  // ─── HELPERS ─────────────────────────────────────────────
  function formatNum(num) {
    if (num >= 1000) return parseFloat(num).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 })
    if (num >= 1)    return parseFloat(num).toFixed(2)
    return parseFloat(num).toFixed(6)
  }

  function formatLarge(num) {
    if (num >= 1e12) return `$${(num/1e12).toFixed(2)}T`
    if (num >= 1e9)  return `$${(num/1e9).toFixed(2)}B`
    if (num >= 1e6)  return `$${(num/1e6).toFixed(2)}M`
    return `$${num.toLocaleString()}`
  }

  function showToast(msg, type = 'green') {
    const colors = { green:'#059669', red:'#dc2626', amber:'#d97706' }
    const ex = document.querySelector('.toast')
    if (ex) ex.remove()
    const t = document.createElement('div')
    t.className   = 'toast'
    t.textContent = msg
    t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${colors[type]};color:#fff;padding:12px 24px;border-radius:100px;font-size:0.85rem;font-weight:600;z-index:9999;animation:fadeIn 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.3);white-space:nowrap`
    document.body.appendChild(t)
    setTimeout(() => t.remove(), 3000)
  }

  init()
</script>
